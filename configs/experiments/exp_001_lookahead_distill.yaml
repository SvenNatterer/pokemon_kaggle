# EXP-001: On-The-Fly Lookahead Tree Search Policy Distillation Config
algorithm: PPO
learning_rate: 0.0001
n_steps: 512
batch_size: 1024
n_epochs: 2
gamma: 0.999
gae_lambda: 0.95
clip_range: 0.12
ent_coef: 0.008
opp_pool: decks/pools/kaggle_rule_bots_dev_pool.json

# Lookahead Teacher Distillation Parameters
distill_coef: 0.1
teacher_sample_rate: 0.03  # Targeted sampling: 3% + high-branching critical decisions
lookahead:
  max_depth: 5
  beam_width: 3
  node_budget: 32
  max_combinations: 16
