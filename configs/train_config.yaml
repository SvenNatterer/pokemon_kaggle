# Default PPO Training Configuration (Adopted from EXP-005 1M Champion)
algorithm: PPO
learning_rate: 0.0001
n_steps: 512
batch_size: 1024
n_epochs: 2
gamma: 0.999
gae_lambda: 0.95
clip_range: 0.12
ent_coef: 0.008
aux_coef: 0.1
distill_coef: 0.1
teacher_sample_rate: 0.05

lookahead:
  max_depth: 1
  beam_width: 2
  node_budget: 8
  max_combinations: 16
