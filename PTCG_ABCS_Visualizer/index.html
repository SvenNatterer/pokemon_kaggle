<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG Replay Visualizer</title>
<style>

  :root{
    --bg:#8fb974; --panel:#ffffff; --panel2:#f0f0f0; --line:#333;
    --txt:#000; --dim:#555; --accent:#2a5d24; --p0:#3a6df0; --p1:#e0533d;
    --hpgood:#3fb950; --hpmid:#d29922; --hpbad:#f85149;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;}
  header{position:sticky;top:0;z-index:5;background:#2c3a26;color:white;border-bottom:1px solid var(--line);
         padding:8px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  header h1{font-size:15px;margin:0;color:white;white-space:nowrap;}
  header .meta, header .meta b{color:white;}
  button{background:#555;color:white;border:1px solid #222;border-radius:6px;
         padding:5px 11px;cursor:pointer;font-size:13px;}
  button:hover{background:#777;}
  button:disabled{opacity:.4;cursor:default;}
  #slider{flex:1;min-width:160px;}
  
  #wrap{display:grid;grid-template-columns:300px 1fr;gap:20px;padding:10px;align-items:start;height:calc(100vh - 50px);}
  @media(max-width:1000px){#wrap{grid-template-columns:1fr;}}
  
  .side{display:flex;flex-direction:column;gap:10px;height:100%;}
  .logbox, .selbox, .selactbox{background:var(--panel);border:1px solid var(--line);display:flex;flex-direction:column;}
  .logbox{flex:1;min-height:0;}
  .selbox{height:150px;flex:none;}
  .selactbox{height:80px;flex:none;}
  .side h3{margin:0;padding:4px;font-size:14px;background:var(--bg);color:var(--txt);border-bottom:1px solid var(--line);text-align:center;}
  .log{padding:8px;white-space:pre-wrap;font-family:Consolas,monospace;font-size:12px;line-height:1.5;overflow:auto;flex:1;}
  .log .res{color:var(--hpgood);font-weight:700;}
  .log .atk{color:#ffb454;} .log .hp{color:#ff7b72;}
  .log .p0{color:blue;} .log .p1{color:red;}
  .selbox .sel{padding:8px;font-family:Consolas,monospace;font-size:12px;overflow:auto;}
  .selactbox .sel{padding:8px;font-family:Consolas,monospace;font-size:12px;}
  
  .board-area{display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;width:100%;height:100%;overflow-y:auto;}
  .side-prizes { display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;width:110px;height:100%;z-index:4; }
  
  .player-hand { display:flex;flex-direction:row;justify-content:center;z-index:2; }
  .player-hand .card { margin-right: -45px; }
  .player-hand .card:last-child { margin-right: 0; }
  
  .playmat{
    position:relative;
    width:100%;
    max-width:800px;
    min-width:600px;
    min-height:820px;
    flex:1;
    border:2px solid white;
    background:transparent;
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    align-items:center;
    padding: 10px 0;
    overflow:hidden;
  }
  
  .playmat::before{
    content:'';
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:350px;height:350px;
    border:4px solid white;
    border-radius:50%;
    z-index:0;
  }
  .playmat::after{
    content:'';
    position:absolute;
    top:50%;left:0;
    transform:translateY(-50%);
    width:100%;height:4px;
    background:white;
    z-index:0;
  }
  .playmat-center-circle{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:100px;height:100px;
    border:4px solid white; background:transparent;
    border-radius:50%;
    z-index:1;
  }
  
  .zone{z-index:2;}
  
  .bench{display:flex;flex-direction:row;gap:10px;} 
  .p1-bench{}
  .p0-bench{}
  
  .p1-hand{}
  .p0-hand{}
  
  /* Rotate P1 Active, Bench, and Hand */
  .p1-bench .card, #active1 .card, .p1-hand .card { transform: rotate(180deg); }
  
  .active-area{display:flex;flex-direction:column;align-items:center;gap:30px;z-index:2;}
  .active-card{display:flex;justify-content:center;}
  
  .prize-dash{width:44px;height:61px;border:2px dashed rgba(255,255,255,0.5);border-radius:6px;flex:none;}
  
  .res-p1{position:absolute;top:5px;left:50%;transform:translateX(-50%);color:#d32f2f;font-size:20px;font-weight:bold;white-space:nowrap;z-index:3;}
  .res-p0{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);color:#1976d2;font-size:20px;font-weight:bold;white-space:nowrap;z-index:3;}
  
  .stats{position:absolute;font-size:24px;font-weight:bold;}
  .stats div{margin-bottom:10px;}
  .p1-stats{left:30px;top:30px;text-align:left;}
  .p0-stats{right:30px;bottom:30px;text-align:right;}
  .stats-turn{color:#ffeb3b;text-shadow:1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;}
  .stats-text{color:black;}
  
  .card{position:relative;width:74px;height:103px;border-radius:6px;background:var(--panel2);
        border:1px solid var(--line);flex:none;}
  .active-card .card{width:100px;height:140px;}

  .hp-text {
    position: absolute;
    bottom: 2px;
    right: 4px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    -webkit-text-stroke: 1px black;
    text-shadow: 1px 1px 2px black;
    z-index: 10;
    pointer-events: none;
  }
  .active-card .hp-text {
    font-size: 18px;
    bottom: 4px;
    right: 6px;
  }
  
  @keyframes popCard {
    0% { transform: scale(0.5); opacity: 0; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .played-cards {
    position: absolute;
    top: 50%; left: 30px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 50;
    pointer-events: none;
  }
  .played-cards .card {
    width: 148px;
    height: 206px;
    border-radius: 10px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    animation: popCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  .stadium-card {
    position: absolute;
    top: 50%; right: 30px;
    transform: translateY(-50%);
    z-index: 10;
  }
  .stadium-card .card {
    width: 110px;
    height: 153px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  }
  
  .badges {
    position: absolute;
    top: -10px;
    left: -10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 10;
  }
  .p1-bench .badges, #active1 .badges {
    top: auto; bottom: -10px;
    left: auto; right: -10px;
    transform: rotate(180deg);
  }
  .badge {
    background: #ff9800;
    color: white;
    font-size: 10px;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid black;
    font-weight: bold;
    text-shadow: 1px 1px 1px black;
  }
  /* Counter-rotate text for P1 */
  .p1-bench .hp-text, #active1 .hp-text, .p1-hand .hp-text {
    transform: rotate(180deg);
    bottom: auto; top: 2px;
    right: auto; left: 4px;
  }
  #active1 .hp-text { top: 4px; left: 6px; }
  
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:5px;display:none;}
  .card .txt{position:absolute;inset:0;padding:4px;display:flex;flex-direction:column;gap:2px;}
  .card .nm{font-size:10px;line-height:1.15;font-weight:600;max-height:36px;overflow:hidden;}
  .card.hasimg img{display:block;}
  .card.hasimg .txt{display:none;}
  .p1-bench .txt, #active1 .txt, .p1-hand .txt { transform: rotate(180deg); }
  
  .dmg-text {
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    -webkit-text-stroke: 1px black;
    text-shadow: 1px 1px 3px black;
    background: rgba(255, 0, 0, 0.8);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .p1-bench .dmg-text, #active1 .dmg-text, .p1-hand .dmg-text {
    top: auto; bottom: -5px;
    transform: translateX(-50%) rotate(180deg);
  }
  #active1 .dmg-text {
    font-size: 40px;
    width: 60px;
    height: 60px;
    left: 50%;
    top: auto; bottom: -30px;
    transform: translateX(-50%) rotate(180deg);
    color: white;
  }
  #active0 .dmg-text {
    font-size: 40px;
    width: 60px;
    height: 60px;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
  }
  
  .card.small {
    width: 44px;
    height: 61px;
    box-shadow: 0px 2px 4px rgba(0,0,0,0.5);
  }

  .energy-icons {
    position: absolute;
    top: -10px;
    right: -10px;
    display: flex;
    flex-wrap: wrap;
    width: 30px;
    justify-content: flex-end;
    gap: 2px;
    z-index: 10;
    pointer-events: none;
  }
  #active0 .energy-icons {
    width: 50px;
    gap: 4px;
  }
  /* For P1 (rotated cards), we want physical top-right -> bottom-left */
  .p1-bench .energy-icons, .p1-hand .energy-icons {
    top: auto; bottom: -10px;
    right: auto; left: -10px;
    transform: rotate(180deg);
  }
  #active1 .energy-icons {
    top: auto; bottom: -10px;
    right: auto; left: -10px;
    transform: rotate(180deg);
    width: 50px;
    gap: 4px;
  }
  .energy-icon {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid black;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  /* Pseudo-element for SVG symbol overlay */
  .energy-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: center;
    background-size: 70%;
  }
  .active-card .energy-icon {
    width: 24px;
    height: 24px;
    border-width: 2px;
  }
  
  #drop{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;
        flex-direction:column;gap:14px;z-index:20;}
  #drop .box{border:2px dashed #fff;border-radius:14px;padding:40px 60px;text-align:center;color:white;}
  #drop.hide{display:none;}
  .hint{color:var(--dim);font-size:12px;}
  code{background:#0d1117;padding:1px 5px;border-radius:4px;}
  
  #preview{position:fixed;left:0;top:0;z-index:30;display:none;width:auto;pointer-events:none;
           background:#fff;border:1px solid #333;border-radius:10px;padding:6px;
           box-shadow:0 10px 30px #000b;color:#000;}
  #preview .pvrow{display:flex;gap:8px;align-items:flex-start;}
  #preview .pvmain{width:240px;flex:none;}
  #preview img{display:block;width:100%;border-radius:6px;background:var(--panel2);}
  #preview .cap{margin-top:6px;font-size:12px;line-height:1.4;}
  #preview .cap .sub{color:var(--dim);margin-top:2px;}
  #preview .pvenergy{margin-top:6px;display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;}
  #preview .egroup{display:flex;align-items:center;gap:6px;}
  #preview .estack{display:inline-flex;}
  #preview .estack img{width:72px;border-radius:5px;background:var(--panel2);box-shadow:0 1px 5px #000a;}
  #preview .estack img:not(:first-child){margin-left:-52px;}
  #preview .ecount{font-size:12px;font-weight:700;color:var(--dim);}
  #preview .pvtools{flex-direction:column;gap:8px;width:240px;flex:none;}
  
  .zoom{position:fixed;inset:0;z-index:25;background:#000b;display:flex;align-items:flex-start;justify-content:center;padding-top:5vh;}
  .zoom.hide{display:none;}
  .zoom-box{display:flex;flex-direction:column;width:min(92vw,900px);min-height:70vh;max-height:86vh;
            background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .zoom-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  #zoom-title{font-size:14px;font-weight:700;}
  .zoom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:8px;
             justify-items:center;align-content:flex-start;flex:1;min-height:0;overflow:auto;}

</style>
</head>
<body>
<header>
  <h1>PTCG Replay</h1>
  <span id="matchup-info" style="color: var(--accent); font-weight: bold; margin-right: 15px; font-size: 14px;"></span>
  <button id="prev" data-i18n="prev">◀ 前へ</button>
  <button id="playpause" data-i18n="play">▶ Play</button>
  <input id="slider" type="range" min="0" max="0" value="0">
  <button id="next" data-i18n="next">次へ ▶</button>
  <span class="meta"><span data-i18n="step">手数</span> <b id="stepno">0/0</b></span>
  <span class="meta"><span data-i18n="turn">ターン</span> <b id="turn">-</b></span>
  <span class="meta"><span data-i18n="active">手番</span> <b id="active">-</b></span>
  <span class="meta"><span data-i18n="ctx">ctx</span> <b id="ctx">-</b></span>
  <span class="meta" id="result"></span>
  <button id="loadbtn" data-i18n="openFile">ファイルを開く</button>
  <button id="langbtn">EN</button>
  <input id="file" type="file" accept=".json" style="display:none">
</header>

<div id="wrap" style="display:none">
  <div class="side">
    <div class="logbox">
      <h3 data-i18n="logTitle">Log</h3>
      <div class="log" id="log"></div>
    </div>
    <div class="selbox">
      <h3 data-i18n="selectedTitle">Select</h3>
      <div class="sel" id="selected">-</div>
    </div>
    <div class="selactbox">
      <h3>Selected Action</h3>
      <div class="sel" id="selected-action">-</div>
    </div>
  </div>
  
  <div class="board-area">
    <!-- P1 Prizes (Left) -->
    <div class="side-prizes p1-prizes" id="prize1"></div>
    
    <!-- Playmat -->
    <div class="playmat">
      <div class="playmat-center-circle"></div>
      
      <!-- Played Cards Overlay -->
      <div class="played-cards" id="played-cards"></div>
      
      <!-- Stadium -->
      <div class="stadium-card" id="stadium-card"></div>
      
      <!-- P1 Hand -->
      <div class="player-hand p1-hand zone" id="hand1"></div>
      
      <!-- P1 Bench -->
      <div class="bench p1-bench zone" id="bench1"></div>
      
      <!-- P1 Stats -->
      <div class="stats p1-stats" id="stats1"></div>
      
      <!-- Center Actives -->
      <div class="active-area">
        <div class="active-card" id="active1"></div>
        <div class="active-card" id="active0"></div>
      </div>
      
      <!-- Result Text -->
      <div class="res-p1" id="res1"></div>
      <div class="res-p0" id="res0"></div>
      
      <!-- P0 Stats -->
      <div class="stats p0-stats" id="stats0"></div>
      
      <!-- P0 Bench -->
      <div class="bench p0-bench zone" id="bench0"></div>
      
      <!-- P0 Hand -->
      <div class="player-hand p0-hand zone" id="hand0"></div>
    </div>
    
    <!-- P0 Prizes (Right) -->
    <div class="side-prizes p0-prizes" id="prize0"></div>
  </div>
</div>

<div id="drop"><div class="box">
  <div style="font-size:18px;" data-i18n="dropTitle">リプレイ JSON をドロップ</div>
  <div class="hint"><span data-i18n="or">または</span> <button id="pick" data-i18n="chooseFile">ファイルを選択</button></div>
  <div class="hint" data-i18n-html="dropHint"><code>visualize_data()</code> が出力したリプレイ JSON を読み込みます</div>
</div></div>

<div id="preview"><div class="pvrow"><div class="pvmain"><img id="pvimg" alt=""><div class="cap" id="pvcap"></div></div><div class="pvtools" id="pvtools"></div></div></div>

<div id="zoom" class="zoom hide"><div class="zoom-box"><div class="zoom-head"><span id="zoom-title">トラッシュ</span><button id="zoom-close" data-i18n="close">✕ 閉じる</button></div><div class="zoom-grid" id="zoom-grid"></div></div></div>

<script>
// ---- enums / lookups ----
const ENERGY = {0:['C','#b8b8b8'],1:['G','#4caf50'],2:['R','#f44336'],3:['W','#2196f3'],
  4:['L','#fbc02d'],5:['P','#9c27b0'],6:['F','#c66a2e'],7:['D','#455a64'],8:['M','#90a4ae'],
  9:['N','#c0a020'],10:['*','#e0e0e0'],11:['TR','#8d6e63']};
// ---- i18n (EN / JA) ----
let LANG='en'; // Forced to English
const I18N={
  ja:{
    prev:'◀ 前へ', next:'次へ ▶', step:'手数', turn:'ターン', active:'手番', ctx:'ctx', openFile:'ファイルを開く',
    dropTitle:'リプレイ JSON をドロップ', or:'または', chooseFile:'ファイルを選択',
    dropHint:'<code>visualize_data()</code> が出力したリプレイ JSON を読み込みます',
    selectedTitle:'この手で選んだアクション', logTitle:'ログ（この選択まで）',
    close:'✕ 閉じる', discardEmpty:'（トラッシュは空です）', discardTitle:(p,c)=>`P${p} トラッシュ（${c}枚）`,
    deck:'山札', hand:'手札', prize:'サイド', discard:'トラッシュ', turnFlag:'▶ 手番',
    battle:'バトル場', bench:'ベンチ', noBench:'（ベンチなし）', noHand:'（手札なし）', clickDiscard:'クリックでトラッシュ一覧',
    none:'(なし)', facedown:'(裏)', tool:'道具', stadium:'スタジアム', none2:'なし',
    draw:'引分', win:p=>`P${p} 勝利`, notArray:'スナップショット配列ではありません',
    poisoned:'毒', burned:'やけど', asleep:'眠', paralyzed:'麻', confused:'混',
    area:{1:'山札',2:'手札',3:'トラッシュ',4:'バトル場',5:'ベンチ',6:'サイド',7:'スタジアム',8:'エネ',9:'どうぐ',10:'進化元',11:'P',12:'確認中'},
    reason:{1:'サイド0枚',2:'山札切れ',3:'場のポケモン全滅',4:'カード効果'},
    lShuffle:p=>`${p}: 山札シャッフル`, lMulligan:p=>`${p}: たねポケモンなし(マリガン)`,
    lTurnStart:p=>`\n--- ${p} ターン開始 ---`, lTurnEnd:p=>`--- ${p} ターン終了 ---`,
    lDraw:(p,c)=>`${p}: ドロー ${c}`, lDrawReverse:p=>`${p}: ドロー(相手・非公開)`,
    lMoveCard:(p,c,f,to)=>`${p}: ${c} 移動 ${f}→${to}`, lMoveCardReverse:(p,f,to)=>`${p}: 非公開カード移動 ${f}→${to}`,
    lSwitch:(p,a,b)=>`${p}: 入れ替え ${a}⇄${b}`, lChange:(p,a,b)=>`${p}: ポケモン変更 ${a}→${b}`,
    lPlay:(p,c)=>`${p}: プレイ ${c}`, lAttach:(p,c,tg)=>`${p}: ${c} を ${tg} に付ける`,
    lEvolve:(p,tg,c)=>`${p}: 進化 ${tg}→${c}`, lDevolve:(p,tg,c)=>`${p}: 退化 ${tg}→${c}`,
    lMoveAttached:(p,c)=>`${p}: 付与カード移動 ${c}`, lAttack:(p,c,id)=>`${p}: ${c} のワザ (id ${id})`,
    lHp:(p,c,v,dc)=>`${p}: ${c} HP ${v}${dc}`, dmgCounter:' [ダメカン]',
    lStatus:(p,c,sc,r)=>`${p}: ${c} ${sc}${r}`,
    poisonedV:'どく', burnedV:'やけど', asleepV:'ねむり', paralyzedV:'まひ', confusedV:'こんらん', recover:'回復',
    lCoin:(p,h)=>`${p}: コイン ${h}`, heads:'おもて', tails:'うら',
    lResult:(who,r)=>`\n=== 結果: ${who}（${r}）===`, resWin:p=>`P${p} の勝ち`, resDraw:'引き分け',
    play:'▶ 再生', pause:'⏸ 停止'
  },
  en:{
    prev:'◀ Prev', next:'Next ▶', step:'step', turn:'turn', active:'active', ctx:'ctx', openFile:'Open file',
    dropTitle:'Drop replay JSON', or:'or', chooseFile:'Choose file',
    dropHint:'Loads a replay JSON produced by <code>visualize_data()</code>',
    selectedTitle:'Selected action (this step)', logTitle:'Log (up to this choice)',
    close:'✕ Close', discardEmpty:'(discard is empty)', discardTitle:(p,c)=>`P${p} Discard (${c})`,
    deck:'Deck', hand:'Hand', prize:'Prize', discard:'Discard', turnFlag:'▶ Turn',
    battle:'Active', bench:'Bench', noBench:'(no bench)', noHand:'(no hand)', clickDiscard:'Click to view discard',
    none:'(none)', facedown:'(face down)', tool:'Tool', stadium:'Stadium', none2:'none',
    draw:'Draw', win:p=>`P${p} wins`, notArray:'Not a snapshot array',
    poisoned:'PSN', burned:'BRN', asleep:'SLP', paralyzed:'PAR', confused:'CNF',
    area:{1:'Deck',2:'Hand',3:'Discard',4:'Active',5:'Bench',6:'Prize',7:'Stadium',8:'Energy',9:'Tool',10:'Pre-evo',11:'P',12:'Checking'},
    reason:{1:'No prizes left',2:'Deck out',3:'No Pokémon in play',4:'Card effect'},
    lShuffle:p=>`${p}: shuffle deck`, lMulligan:p=>`${p}: no Basic Pokémon (mulligan)`,
    lTurnStart:p=>`\n--- ${p} turn start ---`, lTurnEnd:p=>`--- ${p} turn end ---`,
    lDraw:(p,c)=>`${p}: draw ${c}`, lDrawReverse:p=>`${p}: draw (opponent, hidden)`,
    lMoveCard:(p,c,f,to)=>`${p}: ${c} moved ${f}→${to}`, lMoveCardReverse:(p,f,to)=>`${p}: hidden card moved ${f}→${to}`,
    lSwitch:(p,a,b)=>`${p}: switch ${a}⇄${b}`, lChange:(p,a,b)=>`${p}: change ${a}→${b}`,
    lPlay:(p,c)=>`${p}: play ${c}`, lAttach:(p,c,tg)=>`${p}: attach ${c} to ${tg}`,
    lEvolve:(p,tg,c)=>`${p}: evolve ${tg}→${c}`, lDevolve:(p,tg,c)=>`${p}: devolve ${tg}→${c}`,
    lMoveAttached:(p,c)=>`${p}: move attached ${c}`, lAttack:(p,c,id)=>`${p}: ${c}'s attack (id ${id})`,
    lHp:(p,c,v,dc)=>`${p}: ${c} HP ${v}${dc}`, dmgCounter:' [dmg counter]',
    lStatus:(p,c,sc,r)=>`${p}: ${c} ${sc}${r}`,
    poisonedV:'poisoned', burnedV:'burned', asleepV:'asleep', paralyzedV:'paralyzed', confusedV:'confused', recover:' (recovered)',
    lCoin:(p,h)=>`${p}: coin ${h}`, heads:'heads', tails:'tails',
    lResult:(who,r)=>`\n=== Result: ${who} (${r}) ===`, resWin:p=>`P${p} wins`, resDraw:'Draw',
    play:'▶ Play', pause:'⏸ Pause'
  }
};
function T(key,...args){ const v=(I18N[LANG]||I18N.ja)[key]; return typeof v==='function'?v(...args):(v!=null?v:key); }
function applyStaticI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=T(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML=T(el.dataset.i18nHtml); });
}
function setLang(l){
  LANG=l; try{localStorage.setItem('ptcg_lang',l);}catch(e){}
  const b=document.getElementById('langbtn'); if(b) b.textContent=(LANG==='ja'?'EN':'日本語');
  applyStaticI18n(); if(SNAP.length) render();
}
// NOTE: visualize_data() serializes enums as STRINGS in logs/select (e.g. "Draw","Main"),
// while areas/energies stay as ints. The decoder below switches on the string type.
// card art follows the UI language: ja -> assets/cards_jp/<id>.jpg, en -> assets/cards/<id>.jpg
function cardImgUrl(id){ return 'assets/cards'+(LANG==='ja'?'_jp':'')+'/'+id+'.jpg'; }

let SNAP=[], idx=0, names={}, attacks={};

// ---- loading ----
const drop=document.getElementById('drop'), wrap=document.getElementById('wrap');
function loadText(txt){
  pauseAutoplay();
  try{
    const arr=JSON.parse(txt);
    if(!Array.isArray(arr))throw new Error(T('notArray'));
    SNAP=arr;
    idx=0;
    names={};
    for(const s of SNAP){ collectNames(s.current); }
    if (SNAP.length > 0 && SNAP[0].metadata) {
      const m = SNAP[0].metadata;
      document.getElementById('matchup-info').textContent = `${m.p0_name} ⚔️ ${m.p1_name}`;
    } else {
      document.getElementById('matchup-info').textContent = "";
    }
    document.getElementById('slider').max=SNAP.length-1;
    drop.classList.add('hide');
    wrap.style.display='grid';
    pinHeaderWidths();
    render();
  }catch(e){alert(e);}
}
function collectNames(cur){
  if(!cur) return;
  for(const p of cur.players||[]){
    for(const z of ['active','bench','hand','deck','discard','prize']){
      for(const c of p[z]||[]){ if(c&&c.id!=null&&c.name) names[c.id]=c.name;
        for(const sub of (c.energyCards||[]).concat(c.tools||[],c.preEvolution||[])) if(sub&&sub.name) names[sub.id]=sub.name;
      }
    }
  }
  for(const c of cur.stadium||[]) if(c&&c.name) names[c.id]=c.name;
}
function nm(id){ return (names[id]||'?')+'(#'+id+')'; }

// ---- file pickers ----
document.getElementById('file').addEventListener('change',e=>{
  const f=e.target.files[0]; if(f) f.text().then(loadText);
});
function pick(){ document.getElementById('file').click(); }
document.getElementById('pick').onclick=pick;
document.getElementById('loadbtn').onclick=pick;
window.addEventListener('dragover',e=>{e.preventDefault(); drop.classList.remove('hide');});
window.addEventListener('drop',e=>{

// ---- navigation ----
let isPlaying = false;
let playInterval = null;

function pauseAutoplay() {
  if(!isPlaying) return;
  isPlaying = false;
  clearInterval(playInterval);
  document.getElementById('playpause').textContent = T('play');
}

function startAutoplay() {
  if (idx >= SNAP.length - 1) return;
  isPlaying = true;
  document.getElementById('playpause').textContent = T('pause');
  playInterval = setInterval(() => {
    if (idx < SNAP.length - 1) {
      idx++;
      render();
    } else {
      pauseAutoplay();
    }
  }, 400);
}

document.getElementById('playpause').onclick = () => {
  if (isPlaying) pauseAutoplay();
  else startAutoplay();
};

function go(d){ pauseAutoplay(); idx=Math.max(0,Math.min(SNAP.length-1, idx+d)); render(); }
document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);
document.getElementById('slider').oninput=e=>{ pauseAutoplay(); idx=+e.target.value; render(); };
window.addEventListener('keydown',e=>{

function movePreview(e){
  const pad=16, w=preview.offsetWidth, h=preview.offsetHeight;

  if(x+w>innerWidth)  x=e.clientX-pad-w;

  preview.style.left=x+'px'; preview.style.top=y+'px';

function energyDots(list){
  if(!list||!list.length) return '';
  return '<div class="energies">'+list.map(t=>{
    const [lbl,col]=ENERGY[t]||['?','#888'];
    return `<span class="en" style="background:${col}" title="${lbl}">${lbl}</span>`;

function hpBar(hp,max){
  const r=max?Math.max(0,hp/max):0;
  const col=r>.5?'var(--hpgood)':r>.25?'var(--hpmid)':'var(--hpbad)';
  return `<div class="hpbar"><i style="width:${(r*100).toFixed(0)}%;background:${col}"></i></div>`;
}

function plainCard(c, small){

// ---- log decoding (string-typed events from visualize_data) ----
function P(ev){ return ev.playerIndex!=null?('P'+ev.playerIndex):''; }
function area(a){ return (I18N[LANG]||I18N.ja).area[a]||('area'+a); }
function decode(ev){
  const p=P(ev);
  switch(ev.type){
    case 'Shuffle': return T('lShuffle',p);
    case 'HasBasicPokemon': return ev.hasBasicPokemon===false?T('lMulligan',p):null;
    case 'TurnStart': return T('lTurnStart',p);
    case 'TurnEnd': return T('lTurnEnd',p);
    case 'Draw': return T('lDraw',p,nm(ev.cardId));
    case 'DrawReverse': return T('lDrawReverse',p);
    case 'MoveCard': return T('lMoveCard',p,nm(ev.cardId),area(ev.fromArea),area(ev.toArea));
    case 'MoveCardReverse': return T('lMoveCardReverse',p,area(ev.fromArea),area(ev.toArea));
    case 'Switch': return T('lSwitch',p,nm(ev.cardIdActive),nm(ev.cardIdBench));
    case 'Change': return T('lChange',p,nm(ev.cardIdBefore),nm(ev.cardIdAfter));
    case 'Play': return T('lPlay',p,nm(ev.cardId));
    case 'Attach': return T('lAttach',p,nm(ev.cardId),nm(ev.cardIdTarget));
    case 'Evolve': return T('lEvolve',p,nm(ev.cardIdTarget),nm(ev.cardId));
    case 'Devolve': return T('lDevolve',p,nm(ev.cardIdTarget),nm(ev.cardId));
    case 'MoveAttached': return T('lMoveAttached',p,nm(ev.cardId));
    case 'Attack': return `<span class="atk">${T('lAttack',p,nm(ev.cardId),ev.attackId)}</span>`;
    case 'HpChange': return `<span class="hp">${T('lHp',p,nm(ev.cardId),(ev.value>0?'+':'')+ev.value,ev.putDamageCounter?T('dmgCounter'):'')}</span>`;
    case 'Poisoned': case 'Burned': case 'Asleep': case 'Paralyzed': case 'Confused':{
      const sc={Poisoned:T('poisonedV'),Burned:T('burnedV'),Asleep:T('asleepV'),Paralyzed:T('paralyzedV'),Confused:T('confusedV')}[ev.type];
      return T('lStatus',p,nm(ev.cardId),sc,ev.isRecover?T('recover'):'');
    }
    case 'Coin': return T('lCoin',p,ev.head?T('heads'):T('tails'));
    case 'Result':{
      const who=ev.result===2?T('resDraw'):T('resWin',ev.result);
      return `<span class="res">${T('lResult',who,(I18N[LANG]||I18N.ja).reason[ev.reason]||('reason'+ev.reason))}</span>`;
    }
    default: return `${p}: ${ev.type} ${JSON.stringify(ev)}`;
  }
}
function describeSelected(s){
  if(!s.selected||!s.select) return '-';
  const opts=s.select.option||[];
  const parts=s.selected.map(i=>{
    const o=opts[i]; if(!o) return `#${i}`;
    let d=o.type; for(const f of ['index','area','inPlayArea','inPlayIndex','attackId','cardId','number']) if(o[f]!=null) d+=` ${f}=${o[f]}`;
    return `[${i}] ${d}`;
  });
  return `${s.select.type}/${s.select.context} → ${parts.join(' , ')}`;
}

// ---- header width pinning (keep the Next button from shifting as values change) ----
// The slider is the only flex:1 item, so its width — and thus the Next button after
// it — changes whenever ctx/step/turn change width. Reserve each field's max width.
function measureMax(el, candidates){
  const prev=el.textContent;
  el.style.display='inline-block'; el.style.minWidth='0';
  let max=0;
  for(const c of candidates){ el.textContent=c; if(el.offsetWidth>max) max=el.offsetWidth; }
  el.textContent=prev;
  el.style.minWidth=Math.ceil(max)+'px';
}
function pinHeaderWidths(){
  const ctxLabels=new Set(['-']);
  let maxTurn=0;
  for(const s of SNAP){
    ctxLabels.add((s.select&&s.select.context)||'-');
    const t=s.current&&s.current.turn;
    if(typeof t==='number'&&t>maxTurn) maxTurn=t;
  }
  measureMax(document.getElementById('ctx'), [...ctxLabels]);
  measureMax(document.getElementById('stepno'), [SNAP.length+'/'+SNAP.length]);
  measureMax(document.getElementById('turn'), ['-', String(maxTurn||1)]);
}

// ---- main render ----
function renderInner(){
  const s=SNAP[idx], cur=s.current;
  document.getElementById('slider').value=idx;
  document.getElementById('stepno').textContent=`${idx+1}/${SNAP.length}`;
  document.getElementById('turn').textContent=cur.turn;
  document.getElementById('active').textContent='P'+cur.yourIndex;
  document.getElementById('ctx').textContent=(s.select&&s.select.context)||'-';
  
  const meta=SNAP[0].metadata||{};
  const p1_name = meta.p1_name || 'Player 1';
  const p0_name = meta.p0_name || 'Player 0';
  
  // Render Hands
  document.getElementById('hand1').innerHTML = cur.players[1].hand ? cur.players[1].hand.map(c=>plainCard(c)).join('') : '';
  document.getElementById('hand0').innerHTML = cur.players[0].hand ? cur.players[0].hand.map(c=>plainCard(c)).join('') : '';
  
  // Render Benches
  document.getElementById('bench1').innerHTML = cur.players[1].bench ? cur.players[1].bench.map(c=>pokemonCard(c)).join('') : '';
  document.getElementById('bench0').innerHTML = cur.players[0].bench ? cur.players[0].bench.map(c=>pokemonCard(c)).join('') : '';
  
  // Render Actives
  document.getElementById('active1').innerHTML = (cur.players[1].active&&cur.players[1].active.length) ? pokemonCard(cur.players[1].active[0], {active:true}) : '';
  document.getElementById('active0').innerHTML = (cur.players[0].active&&cur.players[0].active.length) ? pokemonCard(cur.players[0].active[0], {active:true}) : '';
  
  // Render Prizes
  const renderPrize = c => (c && c.id && c.id !== 'Unknown') ? plainCard(c, true) : '<div class="prize-dash"></div>';
  document.getElementById('prize1').innerHTML = (cur.players[1].prize || []).map(renderPrize).join('');
  document.getElementById('prize0').innerHTML = (cur.players[0].prize || []).map(renderPrize).join('');
  
  // Render Stadium
  document.getElementById('stadium-card').innerHTML = (cur.stadium && cur.stadium.length) ? plainCard(cur.stadium[0]) : '';
  
  // Render Played Cards from this step's logs
  // Reconstruct card objects since ev just has cardId
  const playedHtml = (s.logs || []).filter(ev => ev.type === 'Play' && ev.cardId).map(ev => plainCard({id: ev.cardId})).join('');
  const playedCardsEl = document.getElementById('played-cards');
  if(playedHtml) {
    playedCardsEl.innerHTML = playedHtml;
    // reset animation
    playedCardsEl.style.animation = 'none';
    playedCardsEl.offsetHeight; /* trigger reflow */
    playedCardsEl.style.animation = null;
    playedCardsEl.style.display = 'flex';
  } else {
    playedCardsEl.innerHTML = '';
    playedCardsEl.style.display = 'none';
  }
  
  // Render Stats
  document.getElementById('stats1').innerHTML = `
    <div class="stats-turn">${cur.yourIndex===1 ? 'First' : 'Second'}</div>
    <div class="stats-text">Discard ${cur.players[1].discard ? cur.players[1].discard.length : 0}</div>
    <div class="stats-text">Deck ${cur.players[1].deckCount}</div>
  `;
  document.getElementById('stats0').innerHTML = `
    <div class="stats-turn">${cur.yourIndex===0 ? 'First' : 'Second'}</div>
    <div class="stats-text">Discard ${cur.players[0].discard ? cur.players[0].discard.length : 0}</div>
    <div class="stats-text">Deck ${cur.players[0].deckCount}</div>
  `;
  
  // Results
  if(cur.result >= 0) {
      if(cur.result === 0) {
         document.getElementById('res0').textContent = `[Win] ${p0_name} (+1)`;
         document.getElementById('res1').textContent = `[Loss] ${p1_name} (-3)`;
      } else if (cur.result === 1) {
         document.getElementById('res1').textContent = `[Win] ${p1_name} (+1)`;
         document.getElementById('res0').textContent = `[Loss] ${p0_name} (-3)`;
      } else {
         document.getElementById('res0').textContent = `[Draw]`;
         document.getElementById('res1').textContent = `[Draw]`;
      }
  } else {
      document.getElementById('res0').textContent = '';
      document.getElementById('res1').textContent = '';
  }

  document.getElementById('selected').textContent=describeSelected(s);
  document.getElementById('selected-action').textContent= s.select ? (s.select.option && s.select.option[0] && s.select.option[0].name ? s.select.option[0].name : describeSelected(s)) : '-';
  document.getElementById('log').innerHTML=(s.logs||[]).map(decode).filter(x=>x!=null).join('\\n');

  document.getElementById('prev').disabled=idx===0;
  document.getElementById('next').disabled=idx===SNAP.length-1;
  if(zoomPi!==null) renderZoom();   // keep an open trash grid in sync while navigating
}

function render(){
  if(document.startViewTransition) {
    document.startViewTransition(() => { renderInner(); });
  } else {
    renderInner();
  }
}


// ---- language toggle + initial apply ----
document.getElementById('langbtn').onclick=()=>setLang(LANG==='ja'?'en':'ja');
setLang(LANG);   // apply the current language to the static UI and set the toggle label
</script>
